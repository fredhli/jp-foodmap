<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Japan transit preview</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  html, body { margin: 0; height: 100%; font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif; }
  #map { width: 100%; height: 100%; background: #eef2f5; }
  #stats {
    position: absolute; top: 12px; left: 60px; z-index: 1000;
    background: rgba(255,255,255,0.95); border-radius: 8px;
    padding: 6px 10px; font-size: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
<div id="map"></div>
<div id="stats">loading…</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="transit-layer.js"></script>
<script>
const map = L.map('map', { preferCanvas: true, zoomControl: true })
  .setView([35.68, 139.77], 6);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
  maxZoom: 19, attribution: '&copy; OSM &copy; CARTO',
}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
  maxZoom: 19, pane: 'shadowPane', opacity: 0.85,
}).addTo(map);

const stats = document.getElementById('stats');
const t0 = performance.now();
const transit = L.transitLayer({
  geojsonUrl: 'transit/japan.geojson',
  opacity: 1.0,         // full opacity on this test page (no underlying map markers)
  casingOpacity: 0.85,
}).addTo(map);

// Polling-style stat updates for the test page.
function updateStats() {
  if (!transit._loaded) {
    stats.textContent = 'loading transit data…';
  } else {
    const z = map.getZoom();
    stats.textContent =
      `z${z} · ${transit._onMap.size.toLocaleString()} / ${transit._allLines.length.toLocaleString()} lines on map · loaded ${((performance.now()-t0)/1000).toFixed(1)}s ago`;
  }
}
setInterval(updateStats, 250);
map.on('moveend', updateStats);
</script>
</body>
</html>
